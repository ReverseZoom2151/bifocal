; PlatformIO project configuration for Bifocal
; ---------------------------------------------
; Bifocal is an Arduino sketch for the Pololu 3Pi+ 32U4 line-following robot.
; The MCU is an ATmega32U4, the same chip as the Arduino Leonardo, so the
; standard atmelavr platform can build and (optionally) upload the firmware.
;
; Source layout note:
;   The firmware is a classic Arduino .ino sketch with headers alongside it in
;   firmware/line_following/. PlatformIO normally expects .cpp sources under a
;   src/ directory, but it also builds .ino sketches in place and auto-converts
;   the .ino to a .cpp at build time (it adds the Arduino.h include and forward
;   declarations). We therefore point src_dir directly at the sketch folder so
;   the build runs with NO source moves. Every file in that folder, the .ino and
;   the .h headers, is compiled together as one sketch, matching how the Arduino
;   IDE and arduino-cli treat the folder.
;
; Usage:
;   pio run                 build the firmware
;   pio run --target upload build and flash (set upload_port if auto-detect fails)

[platformio]
; Build the existing sketch folder in place. No files are moved or copied.
src_dir = firmware/line_following

[env:a-star32U4]
platform = atmelavr
; a-star32U4 is the Pololu A-Star 32U4 board definition, the closest match to the
; 3Pi+ 32U4 control board. If your installed platform does not provide this board
; id, switch the line below to "board = leonardo", which is pin- and MCU-
; compatible (ATmega32U4) and is the FQBN this project uses for CI.
board = a-star32U4
framework = arduino

; Serial monitor speed matches the firmware's Serial.begin(9600) trial logging.
monitor_speed = 9600

; Optional: uncomment and set to your port if upload auto-detection fails.
; upload_port = COM3

; Fallback environment using the Arduino Leonardo board definition, which ships
; with the atmelavr platform out of the box and is ATmega32U4-compatible. Build
; it explicitly with:  pio run -e leonardo
[env:leonardo]
platform = atmelavr
board = leonardo
framework = arduino
monitor_speed = 9600
