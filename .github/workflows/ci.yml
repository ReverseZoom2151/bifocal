name: build

# Compile the Bifocal firmware on every push and pull request so that changes
# that break the sketch are caught before merge. No hardware is flashed; this is
# a compile-only check.

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  arduino-cli:
    name: arduino-cli compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install AVR core
        run: arduino-cli core update-index && arduino-cli core install arduino:avr

      # The 3Pi+ 32U4 uses an ATmega32U4. The Leonardo FQDN is MCU-compatible and
      # ships with the arduino:avr core, so it stands in as the compile target.
      - name: Compile sketch
        run: arduino-cli compile --fqbn arduino:avr:leonardo firmware/line_following

  platformio:
    name: PlatformIO build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      # Build the leonardo environment, which uses a board definition bundled with
      # the atmelavr platform and needs no extra board index.
      - name: Build firmware
        run: pio run -e leonardo
